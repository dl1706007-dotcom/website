<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1120" width="100%" height="100%">
  <!-- Definitions for Gradients and Filters -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020b18" />
      <stop offset="50%" stop-color="#041a26" />
      <stop offset="100%" stop-color="#020b18" />
    </linearGradient>
    <linearGradient id="header-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#004d61" />
      <stop offset="50%" stop-color="#00667a" />
      <stop offset="100%" stop-color="#004d61" />
    </linearGradient>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#093145" />
      <stop offset="100%" stop-color="#041a26" />
    </linearGradient>
    <linearGradient id="accent-teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>
    <linearGradient id="circle-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d9488" />
      <stop offset="100%" stop-color="#115e59" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-teal" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="1120" fill="url(#bg-grad)" rx="24" />
  
  <!-- Subtle Grid Pattern -->
  <g opacity="0.04" stroke="#2dd4bf" stroke-width="1">
    <path d="M 0,50 L 1000,50 M 0,100 L 1000,100 M 0,150 L 1000,150 M 0,200 L 1000,200 M 0,250 L 1000,250 M 0,300 L 1000,300 M 0,350 L 1000,350 M 0,400 L 1000,400 M 0,450 L 1000,450 M 0,500 L 1000,500 M 0,550 L 1000,550 M 0,600 L 1000,600 M 0,650 L 1000,650 M 0,700 L 1000,700 M 0,750 L 1000,750 M 0,800 L 1000,800 M 0,850 L 1000,850 M 0,900 L 1000,900 M 0,950 L 1000,950 M 0,1000 L 1000,1000 M 0,1050 L 1000,1050 M 0,1100 L 1000,1100" />
    <path d="M 50,0 L 50,1120 M 100,0 L 100,1120 M 150,0 L 150,1120 M 200,0 L 200,1120 M 250,0 L 250,1120 M 300,0 L 300,1120 M 350,0 L 350,1120 M 400,0 L 400,1120 M 450,0 L 450,1120 M 500,0 L 500,1120 M 550,0 L 550,1120 M 600,0 L 600,1120 M 650,0 L 650,1120 M 700,0 L 700,1120 M 750,0 L 750,1120 M 800,0 L 800,1120 M 850,0 L 850,1120 M 900,0 L 900,1120 M 950,0 L 950,1120" />
  </g>

  <!-- Title Section -->
  <g filter="url(#shadow)">
    <rect x="60" y="40" width="880" height="120" rx="20" fill="url(#header-grad)" stroke="#2dd4bf" stroke-width="2.5" />
    <!-- Small pill header -->
    <rect x="380" y="55" width="240" height="30" rx="15" fill="#041a26" stroke="#2dd4bf" stroke-width="1.5" />
    <text x="500" y="75" text-anchor="middle" fill="#2dd4bf" font-family="'JetBrains Mono', monospace" font-weight="bold" font-size="13" letter-spacing="3">INFOGRAPHIC BÀI 01</text>
    
    <text x="500" y="125" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif" font-weight="800" font-size="26" letter-spacing="0.5">QUY TRÌNH QUẢN LÝ DỮ LIỆU CĂN BẢN</text>
  </g>

  <!-- Central Dotted Connection Line -->
  <line x1="500" y1="160" x2="500" y2="1020" stroke="#2dd4bf" stroke-width="2" stroke-dasharray="6 6" opacity="0.2" />

  <!-- COLUMN I - STEP 1 -->
  <g transform="translate(60, 190)" filter="url(#shadow)">
    <rect x="0" y="0" width="880" height="180" rx="20" fill="url(#card-grad)" stroke="#2dd4bf" stroke-width="1.5" />
    
    <!-- Top-Right Pill -->
    <rect x="740" y="15" width="120" height="26" rx="13" fill="#115e59" stroke="#2dd4bf" stroke-width="1" />
    <text x="800" y="32" text-anchor="middle" fill="#2dd4bf" font-family="'JetBrains Mono', monospace" font-weight="bold" font-size="11">CREATE_ROOT</text>

    <!-- Icon Graphic (Left) -->
    <g transform="translate(40, 30)">
      <!-- Monitor Frame -->
      <rect x="10" y="10" width="100" height="70" rx="8" fill="#041a26" stroke="#2dd4bf" stroke-width="2.5" />
      <line x1="10" y1="65" x2="110" y2="65" stroke="#2dd4bf" stroke-width="1.5" />
      <!-- Stand -->
      <path d="M50,80 L40,105 L80,105 L70,80 Z" fill="#2dd4bf" />
      <rect x="40" y="105" width="40" height="5" rx="2" fill="#2dd4bf" />
      
      <!-- Folder Graphic Inside -->
      <g transform="translate(30, 20)">
        <path d="M5,10 L25,10 L30,16 L55,16 L55,42 L5,42 Z" fill="#2dd4bf" opacity="0.25" stroke="#2dd4bf" stroke-width="1.5" />
        <path d="M5,16 L55,16 L55,42 L5,42 Z" fill="#2dd4bf" stroke="#2dd4bf" stroke-width="1.5" />
      </g>
      
      <!-- Blue Arrow Pointer -->
      <g transform="translate(75, 45)" filter="url(#glow-teal)">
        <polygon points="0,0 8,24 14,14 24,14" fill="#00f2fe" />
      </g>
    </g>

    <!-- Texts Section -->
    <g transform="translate(190, 45)" font-family="'Inter', sans-serif">
      <text x="0" y="15" font-weight="900" font-size="18" fill="#2dd4bf">MỤC 1: KHỞI TẠO THƯ MỤC GỐC</text>
      <text x="0" y="50" font-size="13.5" fill="#e2e8f0" font-weight="500">Tạo thư mục chính <tspan fill="#38bdf8" font-weight="bold">'ThucHanh_DoanNgocLinh'</tspan> trong thư mục</text>
      <text x="0" y="75" font-size="13.5" fill="#e2e8f0" font-weight="500">Documents hoặc phân vùng đĩa không chứa hệ điều hành.</text>
      <text x="0" y="105" font-size="11.5" fill="#94a3b8" font-family="'JetBrains Mono', monospace">* Thao tác mở nhanh File Explorer: Win + E</text>
    </g>
  </g>

  <!-- COLUMN II - STEP 2 -->
  <g transform="translate(60, 400)" filter="url(#shadow)">
    <rect x="0" y="0" width="880" height="180" rx="20" fill="url(#card-grad)" stroke="#a855f7" stroke-width="1.5" />
    
    <!-- Top-Right Pill -->
    <rect x="740" y="15" width="120" height="26" rx="13" fill="#581c87" stroke="#c084fc" stroke-width="1" />
    <text x="800" y="32" text-anchor="middle" fill="#c084fc" font-family="'JetBrains Mono', monospace" font-weight="bold" font-size="11">TXT_FOLDER</text>

    <!-- Icon Graphic (Left) -->
    <g transform="translate(40, 30)">
      <!-- Folder Base -->
      <path d="M10,25 L40,25 L48,35 L90,35 L90,85 L10,85 Z" fill="#a855f7" opacity="0.3" stroke="#a855f7" stroke-width="2" />
      <path d="M10,35 L90,35 L90,85 L10,85 Z" fill="#a855f7" opacity="0.5" stroke="#a855f7" stroke-width="1.5" />
      
      <!-- TXT Document inside -->
      <g transform="translate(45, 10)">
        <rect x="10" y="5" width="36" height="48" rx="4" fill="#041a26" stroke="#c084fc" stroke-width="2" />
        <line x1="16" y1="15" x2="40" y2="15" stroke="#c084fc" stroke-width="1.5" />
        <line x1="16" y1="23" x2="40" y2="23" stroke="#c084fc" stroke-width="1.5" />
        <line x1="16" y1="31" x2="32" y2="31" stroke="#c084fc" stroke-width="1.5" />
        <!-- Small .txt tag -->
        <rect x="12" y="38" width="22" height="10" rx="2" fill="#c084fc" />
        <text x="23" y="46" text-anchor="middle" fill="#041a26" font-family="'Inter', sans-serif" font-weight="900" font-size="7">TXT</text>
      </g>
    </g>

    <!-- Texts Section -->
    <g transform="translate(190, 45)" font-family="'Inter', sans-serif">
      <text x="0" y="15" font-weight="900" font-size="18" fill="#c084fc">MỤC 2: THAO TÁC TỆP .TXT &amp; THƯ MỤC CON</text>
      <text x="0" y="50" font-size="13.5" fill="#e2e8f0" font-weight="500">Khởi tạo tệp <tspan fill="#c084fc" font-weight="bold">'GhiChu.txt'</tspan>, thực hiện đổi tên thành <tspan fill="#c084fc" font-weight="bold">'GhiChuQuanTrong.txt'</tspan></text>
      <text x="0" y="75" font-size="13.5" fill="#e2e8f0" font-weight="500">và tạo thêm một thư mục con tên là <tspan fill="#a855f7" font-weight="bold">'TaiLieu'</tspan> nằm bên trong.</text>
      <text x="0" y="105" font-size="11.5" fill="#94a3b8" font-family="'JetBrains Mono', monospace">* Đổi tên nhanh tệp tin: Phím F2 hoặc chuột phải</text>
    </g>
  </g>

  <!-- COLUMN III - STEP 3 -->
  <g transform="translate(60, 610)" filter="url(#shadow)">
    <rect x="0" y="0" width="880" height="180" rx="20" fill="url(#card-grad)" stroke="#3b82f6" stroke-width="1.5" />
    
    <!-- Top-Right Pill -->
    <rect x="740" y="15" width="120" height="26" rx="13" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1" />
    <text x="800" y="32" text-anchor="middle" fill="#60a5fa" font-family="'JetBrains Mono', monospace" font-weight="bold" font-size="11">COPY_MOVE</text>

    <!-- Icon Graphic (Left) -->
    <g transform="translate(40, 30)">
      <!-- Duplicate Document Stack -->
      <rect x="10" y="15" width="38" height="52" rx="4" fill="#041a26" stroke="#3b82f6" stroke-width="2" />
      <line x1="18" y1="28" x2="40" y2="28" stroke="#3b82f6" stroke-width="1.5" />
      <line x1="18" y1="38" x2="40" y2="38" stroke="#3b82f6" stroke-width="1.5" />
      
      <!-- Duplicate Arrow Loop -->
      <path d="M55,30 Q70,15 80,35" fill="none" stroke="#60a5fa" stroke-width="2" stroke-dasharray="2 2" />
      <polygon points="80,35 73,32 78,27" fill="#60a5fa" />
      
      <!-- Destination Document -->
      <g transform="translate(50, 25)">
        <rect x="10" y="15" width="38" height="52" rx="4" fill="#041a26" stroke="#60a5fa" stroke-width="2" />
        <line x1="18" y1="28" x2="40" y2="28" stroke="#60a5fa" stroke-width="1.5" />
        <line x1="18" y1="38" x2="40" y2="38" stroke="#60a5fa" stroke-width="1.5" />
      </g>
    </g>

    <!-- Texts Section -->
    <g transform="translate(190, 45)" font-family="'Inter', sans-serif">
      <text x="0" y="15" font-weight="900" font-size="18" fill="#60a5fa">MỤC 3: SAO CHÉP &amp; DI CHUYỂN TỆP TIN</text>
      <text x="0" y="50" font-size="13.5" fill="#e2e8f0" font-weight="500">Sử dụng phím tắt <tspan fill="#60a5fa" font-weight="bold">[Ctrl+C] / [Ctrl+V]</tspan> để nhân bản tệp văn bản và</text>
      <text x="0" y="75" font-size="13.5" fill="#e2e8f0" font-weight="500">sử dụng phím tắt <tspan fill="#60a5fa" font-weight="bold">[Ctrl+X] / [Ctrl+V]</tspan> để di chuyển tệp <tspan fill="#3b82f6" font-weight="bold">'DiChuyen.txt'</tspan>.</text>
      <text x="0" y="105" font-size="11.5" fill="#94a3b8" font-family="'JetBrains Mono', monospace">* Thao tác nhanh giúp tiết kiệm 150% thời gian lưu trữ</text>
    </g>
  </g>

  <!-- COLUMN IV - STEP 4 -->
  <g transform="translate(60, 820)" filter="url(#shadow)">
    <rect x="0" y="0" width="880" height="180" rx="20" fill="url(#card-grad)" stroke="#f59e0b" stroke-width="1.5" />
    
    <!-- Top-Right Pill -->
    <rect x="740" y="15" width="120" height="26" rx="13" fill="#78350f" stroke="#fbbf24" stroke-width="1" />
    <text x="800" y="32" text-anchor="middle" fill="#fbbf24" font-family="'JetBrains Mono', monospace" font-weight="bold" font-size="11">RESTORE_BIN</text>

    <!-- Icon Graphic (Left) -->
    <g transform="translate(40, 30)">
      <!-- Trash Bin -->
      <rect x="25" y="45" width="50" height="50" rx="6" fill="#041a26" stroke="#f59e0b" stroke-width="2.5" />
      <!-- Bin Lines -->
      <line x1="37" y1="55" x2="37" y2="85" stroke="#f59e0b" stroke-width="1.5" />
      <line x1="50" y1="55" x2="50" y2="85" stroke="#f59e0b" stroke-width="1.5" />
      <line x1="63" y1="55" x2="63" y2="85" stroke="#f59e0b" stroke-width="1.5" />
      <!-- Lid -->
      <rect x="20" y="38" width="60" height="7" rx="3" fill="#f59e0b" />
      <rect x="40" y="31" width="20" height="7" rx="2" fill="#f59e0b" />
      
      <!-- Recovery Shield/Key icon -->
      <g transform="translate(70, 45)" stroke="#f59e0b" stroke-width="2" fill="none">
        <circle cx="15" cy="15" r="7" />
        <line x1="20" y1="20" x2="30" y2="30" stroke-width="2.5" />
        <line x1="26" y1="24" x2="30" y2="24" />
        <line x1="28" y1="28" x2="32" y2="28" />
      </g>
    </g>

    <!-- Texts Section -->
    <g transform="translate(190, 45)" font-family="'Inter', sans-serif">
      <text x="0" y="15" font-weight="900" font-size="18" fill="#fbbf24">MỤC 4: XÓA &amp; KHÔI PHỤC DỮ LIỆU</text>
      <text x="0" y="50" font-size="13.5" fill="#e2e8f0" font-weight="500">Xóa thông thường đưa tệp vào <tspan fill="#fbbf24" font-weight="bold">Recycle Bin</tspan>. Xóa vĩnh viễn tệp rác</text>
      <text x="0" y="75" font-size="13.5" fill="#e2e8f0" font-weight="500">bằng <tspan fill="#f59e0b" font-weight="bold">[Shift+Delete]</tspan> và thực hiện khôi phục <tspan fill="#fbbf24" font-weight="bold">(Restore)</tspan> tệp đã xóa.</text>
      <text x="0" y="105" font-size="11.5" fill="#94a3b8" font-family="'JetBrains Mono', monospace">* Tệp bị xóa vĩnh viễn không thể khôi phục từ Recycle Bin</text>
    </g>
  </g>

  <!-- Footer Metadata -->
  <g transform="translate(60, 1030)">
    <rect x="0" y="0" width="880" height="40" rx="8" fill="rgba(0, 77, 97, 0.15)" stroke="rgba(45, 212, 191, 0.1)" stroke-width="1" />
    <text x="20" y="24" fill="#a5f3fc" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="0.5">(*) TOÀN BỘ THAO TÁC ĐÃ KIỂM CHỨNG LIÊM CHÍNH HỌC THUẬT</text>
    <text x="860" y="24" text-anchor="end" fill="#2dd4bf" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">DESIGN BY DOAN NGOC LINH • MSV: 25051227</text>
  </g>
</svg>
